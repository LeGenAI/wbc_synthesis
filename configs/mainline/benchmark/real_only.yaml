# DEV CONFIG: low epochs/batch for quick iteration.
# Use configs/mainline/benchmark/real_only_production.yaml for paper results.
mode: real_only
manifest_root: results/mainline/data
heldout_domain: domain_b_raabin
backbone: efficientnet_b0
batch_size: 16
epochs: 3
lr: 0.0003
weight_decay: 0.0001
seed: 42
train_fraction: 1.0
output_root: results/mainline/benchmark
num_workers: 0
image_size: 224
full_finetune: false
synthetic_manifest: null
synthetic_sampling_weight: 1.0
leakage_filter: true
lr_step_size: 10
lr_gamma: 0.5
class_fractions: {}
eval_tta_mode: none
