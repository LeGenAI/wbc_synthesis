# PRODUCTION CONFIG: hard-class scarcity benchmark with synthetic augmentation.
# Set synthetic_manifest to a merged/filtered manifest before running.
mode: real_plus_synth
manifest_root: results/mainline/data
heldout_domain: domain_b_raabin
backbone: efficientnet_b0
batch_size: 32
epochs: 30
lr: 0.0001
weight_decay: 0.0001
seed: 42
train_fraction: 1.0
output_root: results/mainline/benchmark
num_workers: 4
image_size: 224
full_finetune: false
synthetic_manifest: null
synthetic_sampling_weight: 0.5
leakage_filter: true
lr_step_size: 10
lr_gamma: 0.5
class_fractions:
  eosinophil: 0.25
  monocyte: 0.25
eval_tta_mode: none
